<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista zakupów</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="lista_zakupow">
    <div class="container">
        <header>
            <h1>Lista zakupów</h1>
            <p>Zaplanuj swoje dzisiejsze sprawunki</p>
        </header>

        <div class="input-group">
            <input type="text" id="itemInput" placeholder="Co trzeba kupić?">
            <button id="addBtn">Dodaj</button>
        </div>

        <ul id="shoppingList"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
